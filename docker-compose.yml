networks:
  guacnetwork_compose:
    driver: bridge

# services
services:
  # guacd
  guacd:
    container_name: guacd_compose
    image: guacamole/guacd:1.6.0
    networks:
      - guacnetwork_compose
    restart: always
    volumes:
    - ./drive:/drive:rw
    - ./record:/record:rw
  # postgres
  postgres:
    container_name: postgres_guacamole_compose
    environment:
      PGDATA: /var/lib/postgresql/data/guacamole
      POSTGRES_DB: guacamole_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: guacamole_user
    image: postgres:15.2-alpine
    networks:
      - guacnetwork_compose
    restart: always
    volumes:
    - ./init:/docker-entrypoint-initdb.d:z
    - ./data:/var/lib/postgresql/data:Z

  # guacamole
  guacamole:
    container_name: guacamole_compose
    group_add:
      - "1000"
    depends_on:
    - guacd
    - postgres
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRESQL_USERNAME: guacamole_user
      RECORDING_SEARCH_PATH: /record
      POSTGRESQL_AUTO_CREATE_ACCOUNTS: "true"
      LDAP_ENABLED: "true"
      LDAP_HOSTNAME: ${LDAP_HOSTNAME}
      LDAP_PORT: 389
      LDAP_ENCRYPTION_METHOD: "none"
      LDAP_SEARCH_BIND_DN: "CN=Guacamole,OU=Usuarios,OU=Contoso,DC=server,DC=corp"
      LDAP_SEARCH_BIND_PASSWORD: ${LDAP_SEARCH_BIND_PASSWORD}
      LDAP_USER_BASE_DN: 'OU=Usuarios,OU=Contoso,DC=server,DC=corp'
      LDAP_USERNAME_ATTRIBUTE: "sAMAccountName"
      LDAP_USER_SEARCH_FILTER: "(objectClass=user)"
      LDAP_GROUP_BASE_DN: "OU=Usuarios,OU=Contoso,DC=server,DC=corp"
      LDAP_GROUP_SEARCH_FILTER: "(objectClass=group)"
      LDAP_MEMBER_ATTRIBUTE: "member"
      TOTP_ISSUER: "TOTP"
      TOTP_DIGITS: 6
      TOTP_PERIOD: 30
      TOTP_MODE: "sha1"

    image: guacamole/guacamole:1.6.0
    networks:
      - guacnetwork_compose
    volumes:
      - ./record:/record:rw

    ports:
      - 8080:8080/tcp
    restart: always